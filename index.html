<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── Barre de titre ───────────────────────────────────────── -->
<header class="topbar">
    <div class="topbar-left">
        <span class="app-name">PEERCONNECT</span>
        <span class="app-version">mesh ×12</span>
    </div>
    <div class="topbar-center">
        <div id="status-badge" class="status-badge">
            <span class="dot"></span>
            <span id="status-text">INITIALISATION</span>
        </div>
    </div>
    <div class="topbar-right">
        <span class="topbar-label">PARTICIPANTS</span>
        <strong id="participant-count">1</strong>
        <span class="topbar-label">/ 12</span>
    </div>
</header>

<!-- ─── Layout 3 colonnes ────────────────────────────────────── -->
<div class="layout">

    <!-- ══ GAUCHE : infos, contrôles, stats, log ═════════════ -->
    <aside class="col col-left">

        <section class="panel">
            <div class="panel-title">IDENTITÉ</div>
            <div class="panel-body">
                <div class="id-row">
                    <span class="field-label">VOTRE ID</span>
                    <span id="my-id" class="id-value">—</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-title">CONNEXION</div>
            <div class="panel-body gap-sm">
                <div class="input-btn-row">
                    <input id="peer-id-input" class="flat-input" type="text"
                           placeholder="ID du pair..." maxlength="8" />
                    <button class="btn-call" id="btn-call" onclick="startCall()" disabled>
                        APPELER
                    </button>
                </div>
                <span id="slots-info" class="slots-info">— slots libres</span>
                <div class="media-row">
                    <button class="btn-toggle" id="btn-mic" onclick="toggleMic()">🎤 MIC ON</button>
                    <button class="btn-toggle" id="btn-cam" onclick="toggleCam()">📷 CAM ON</button>
                </div>
                <button class="btn-hangup hidden" id="btn-hangup" onclick="endAllCalls()">
                    ✕ QUITTER LA SESSION
                </button>
            </div>
        </section>

        <section class="panel">
            <div class="panel-title">PAIRS</div>
            <div class="panel-body" id="peers-panel">
                <span class="empty-label" id="no-peers-msg">Aucun pair connecté</span>
            </div>
        </section>

        <section class="panel hidden" id="stats-panel">
            <div class="panel-title">
                STATS WEBRTC
                <span id="stats-refresh" class="stats-refresh"></span>
            </div>
            <div class="panel-body gap-sm">
                <div class="chips-row">
                    <div class="chip"><span class="chip-label">CONN.</span><span class="chip-val" id="stat-connections">—</span></div>
                    <div class="chip"><span class="chip-label">↑ TOTAL</span><span class="chip-val" id="stat-send-total">—</span></div>
                    <div class="chip"><span class="chip-label">↓ TOTAL</span><span class="chip-val" id="stat-recv-total">—</span></div>
                    <div class="chip"><span class="chip-label">↑ kbps</span><span class="chip-val" id="stat-send-rate">—</span></div>
                    <div class="chip"><span class="chip-label">↓ kbps</span><span class="chip-val" id="stat-recv-rate">—</span></div>
                </div>
                <div class="table-wrap">
                    <table class="stats-table">
                        <thead><tr>
                            <th>PAIR</th><th>ICE</th><th>RTT</th>
                            <th>↑</th><th>↓</th><th>PERTE</th><th>RES.</th><th>FPS</th>
                        </tr></thead>
                        <tbody id="stats-peers-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="panel panel-log">
            <div class="panel-title">LOG</div>
            <div id="log" class="log-body"></div>
        </section>

    </aside>

    <!-- ══ CENTRE : grille vidéo ════════════════════════════ -->
    <main class="col col-center">
        <div class="video-grid count-1" id="video-grid">
            <div class="video-wrap local" id="wrap-local">
                <div class="video-placeholder" id="local-placeholder">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M15 10l4.553-2.069A1 1 0 0121 8.867v6.266a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                    </svg>
                    <span>Caméra locale</span>
                </div>
                <video id="local-video" autoplay playsinline muted></video>
                <div class="video-label">LOCAL</div>
            </div>
        </div>
    </main>

    <!-- ══ DROITE : chat ════════════════════════════════════ -->
    <aside class="col col-right">
        <section class="panel panel-chat">
            <div class="panel-title">
                MESSAGES
                <span class="unread-badge hidden" id="unread-badge">0</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-sys">Chat actif pendant un appel</div>
            </div>
            <div class="chat-footer">
                <input
                        id="chat-input"
                        class="flat-input"
                        type="text"
                        placeholder="Écrire un message..."
                        maxlength="500"
                        onkeydown="if(event.key==='Enter') window.sendChatMessage()"
                        disabled
                />
                <button class="btn-send" id="chat-send-btn"
                        onclick="window.sendChatMessage()" disabled>↵</button>
            </div>
        </section>
    </aside>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
